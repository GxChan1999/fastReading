name: reading_efficiency_app
description: 本地阅读提效对话APP
version: 1.0.0+1

environment:
  sdk: '>=3.4.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # 核心数据库（SQLite）
  sqlite3: ^2.4.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0
  # 电子书解析
  epub_pro: 5.4.2     # EPUB 解析（锁定版本，>=5.5.0 需要 Dart SDK >=3.8）
  html: ^0.15.5       # HTML → 纯文本提取
  image: ^4.5.4       # 图片编解码（EPUB 封面提取）
  # 网络请求（AI API直连）
  dio: ^5.4.3+1
  # MD文件解析与渲染
  flutter_markdown: ^0.7.3+1
  markdown: ^7.2.2
  # 数据加密
  encrypt: ^5.0.3
  crypto: ^3.0.3
  # 状态管理
  flutter_riverpod: ^2.5.1
  # 工具类
  equatable: ^2.0.5
  file_picker: ^8.0.3
  share_plus: ^9.0.0
  intl: ^0.19.0
  uuid: ^4.4.0
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/prompts/
